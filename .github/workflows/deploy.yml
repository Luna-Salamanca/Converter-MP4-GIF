name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

      - name: Debug - List dist contents
        run: |
          echo "=== Root dist ==="
          ls -la dist/ || echo "dist/ does not exist"
          echo ""
          echo "=== dist/public ==="
          ls -la dist/public/ || echo "dist/public/ does not exist"
          echo ""
          echo "=== Current directory ==="
          pwd
          ls -la

      - name: Deploy
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist/public